name: Integration tests

on:
  pull_request:
  schedule:
    - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    with:
      channel: 1.35-classic/stable
      extra-arguments: '-x --log-format="%(asctime)s %(levelname)s %(message)s"'
      use-canonical-k8s: true
      provider: k8s
      juju-channel: 3/stable
      charmcraft-channel: latest/edge
      modules: '["test_actions.py", "test_gateway_route.py", "test_gateway_route_https.py", "test_haproxy_adapter.py", "test_haproxy_integrator.py", "test_haproxy_route_tcp.py", "test_ingress_kubernetes.py"]'
      with-uv: true
      pre-run-script: tests/integration/prepare.sh
  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs:
      - integration-tests
    uses: canonical/operator-workflows/.github/workflows/allure_report.yaml@main
